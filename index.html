<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SKU 排序 + 组合装生成</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fb;--surface:#fff;--border:#e2e6ef;
      --accent:#3b5bdb;--accent-light:#eef1fd;
      --text:#1a1d2e;--muted:#6b7280;--warn:#f59e0b;
      --green:#2d9e5f;--radius:8px;
      --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    }
    body{font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 60px}
    .page{max-width:1000px;margin:0 auto}

    /* tabs */
    .tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--border)}
    .tab{padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;
      border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;
      color:var(--muted);background:transparent;font-family:inherit;
      position:relative;bottom:-2px;transition:color .15s,background .15s}
    .tab.active{color:var(--accent);background:var(--surface);
      border-color:var(--border);border-bottom-color:var(--surface)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:0 var(--radius) var(--radius) var(--radius);
      box-shadow:var(--shadow);padding:16px 20px;margin-bottom:16px}
    .card.flat-top{border-top-left-radius:0}

    label.field-label{display:block;font-size:12px;font-weight:600;color:var(--muted);
      text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}

    textarea{width:100%;height:110px;padding:10px 12px;border:1px solid var(--border);
      border-radius:6px;font-size:13px;font-family:"Consolas","Microsoft YaHei",monospace;
      resize:vertical;line-height:1.6;color:var(--text);background:#fafbfd;transition:border-color .2s}
    textarea:focus{outline:none;border-color:var(--accent);background:#fff}

    .toolbar{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;
      font-family:inherit;border-radius:6px;border:1px solid var(--border);background:var(--surface);
      color:var(--text);cursor:pointer;transition:background .15s;white-space:nowrap}
    button:hover{background:#f3f4f8}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
    button.primary:hover{background:#2f4dc4}
    button.green{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
    button.green:hover{background:#237a4a}
    .spacer{flex:1}
    .stat{font-size:12px;color:var(--muted)}
    .stat strong{color:var(--text)}

    .result-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
    .filter-bar{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);
      background:#f9fafc;flex-wrap:wrap}
    .filter-bar input{flex:1;min-width:120px;padding:5px 9px;border:1px solid var(--border);
      border-radius:5px;font-size:12px;font-family:inherit;background:#fff;color:var(--text)}
    .filter-bar input:focus{outline:none;border-color:var(--accent)}
    .filter-bar input::placeholder{color:#adb5bd}

    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{background:var(--accent-light);padding:9px 12px;text-align:left;
      font-weight:600;font-size:12px;color:var(--accent);border-bottom:2px solid #c5cffa;
      white-space:nowrap;cursor:pointer;user-select:none}
    thead th:hover{background:#e3e8fb}
    thead th.sort-asc .si::after{content:" ↑"}
    thead th.sort-desc .si::after{content:" ↓"}
    thead th .si{opacity:.4}
    thead th.sort-asc .si,thead th.sort-desc .si{opacity:1}
    tbody tr{border-bottom:1px solid var(--border)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f7f8fc}
    td{padding:8px 12px;vertical-align:middle}
    code{font-family:"Consolas",monospace;font-size:12px}

    /* 组合装表格 - 同组交替底色 */
    .combo-row-a{background:#fff}
    .combo-row-b{background:#f5f7ff}
    .combo-row-a:hover,.combo-row-b:hover{background:#eef1fd}
    .group-divider td{border-top:2px solid #c5cffa!important}

    .tag{display:inline-block;margin-left:4px;padding:1px 6px;border-radius:4px;
      font-size:10px;background:#fff8e1;color:#f57f17;border:1px solid #ffe082;vertical-align:middle}
    .fail-mark{font-size:11px;color:var(--warn);margin-left:4px}
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
    .empty .icon{font-size:28px;margin-bottom:8px}

    /* combo type badge */
    .cbadge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:700}
    .cb2{background:#e3f2fd;color:#1565c0}
    .cb3{background:#e8f5e9;color:#1b5e20}

    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
      background:#1a1d2e;color:#fff;padding:9px 18px;border-radius:6px;font-size:13px;
      opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* prefix config row */
    .cfg-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
    .cfg-row label{font-size:12px;color:var(--muted);white-space:nowrap}
    .cfg-row input[type=text]{padding:5px 9px;border:1px solid var(--border);border-radius:5px;
      font-size:13px;font-family:inherit;width:120px}
    .cfg-row input[type=text]:focus{outline:none;border-color:var(--accent)}
  </style>
</head>
<body>
<div class="page">

  <!-- Tab header -->
  <!-- 天气栏 -->
  <div class="weather-bar">
    <div class="weather-info" id="weather-widget">
      <span>⛅</span>
      <span id="weather-text" style="color:var(--muted)">获取天气中…</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('sort')">📋 单品排序</button>
    <button class="tab" onclick="switchTab('combo')">📦 组合装生成</button>
    <button class="tab" onclick="switchTab('match')">🔗 平台SKU匹配</button>
  </div>

  <!-- ═══ TAB 1: 单品排序 ═══ -->
  <div class="tab-panel active" id="tab-sort">
    <!-- 两栏输入 -->
    <div style="display:flex;gap:12px;margin-bottom:12px">
      <!-- 系列A -->
      <div class="card flat-top" style="flex:1;min-width:0">
        <label class="field-label">系列A 单品数据</label>
        <textarea id="sort-input" style="height:90px"
          placeholder="粘贴第一种书的单品数据&#10;示例：9787214151230-26&#9;26秋-实验班提优训练-北师-一数上"></textarea>
        <div class="toolbar" style="margin-top:8px">
          <button class="primary" onclick="processSort()">▶ 解析排序</button>
          <button class="green" onclick="syncToCombo()">⚡ 生成组合装</button>
          <button style="background:#0891b2;color:#fff;border-color:#0891b2" onclick="copySortResult()">📋 复制</button>
          <button onclick="exportSortCSV()">💾 导出</button>
          <span class="spacer"></span>
          <span class="stat" id="sort-stat"></span>
          <button onclick="clearSort()">✕ 清空</button>
        </div>
      </div>
      <!-- 系列B -->
      <div class="card" style="flex:1;min-width:0;border-top-left-radius:var(--radius)">
        <label class="field-label">系列B 单品数据（选填，用于生成4/6本组合）</label>
        <textarea id="sort-input-b" style="height:90px"
          placeholder="粘贴第二种书的单品数据（可选）&#10;示例：9787214296795-26&#9;26秋-提优大考卷-北师-一数上"></textarea>
        <div class="toolbar" style="margin-top:8px">
          <button class="primary" onclick="processSortB()">▶ 解析排序</button>
          <button style="background:#0891b2;color:#fff;border-color:#0891b2" onclick="copySortResultB()">📋 复制</button>
          <span class="spacer"></span>
          <span class="stat" id="sort-stat-b"></span>
          <button onclick="clearSortB()">✕ 清空</button>
        </div>
      </div>
    </div>

    <!-- 合并结果表格 -->
    <div class="result-card">
      <div class="filter-bar">
        <input type="text" id="sf-sku"  placeholder="🔍 单品编码" oninput="applySortFilters()">
        <input type="text" id="sf-name" placeholder="🔍 名称"     oninput="applySortFilters()">
        <span id="sf-series-tag" style="font-size:12px;color:var(--muted);align-self:center"></span>
      </div>
      <div class="table-wrap">
        <table id="sort-table">
          <thead><tr>
            <th onclick="sortBy('sku')"  data-col="sku">  单品编码 <span class="si"></span></th>
            <th onclick="sortBy('name')" data-col="name"> 名称     <span class="si"></span></th>
            <th>系列</th>
          </tr></thead>
          <tbody id="sort-tbody">
            <tr><td colspan="3" class="empty"><div class="icon">📄</div>粘贴数据后点击「解析排序」</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══ TAB 2: 组合装 ═══ -->
  <div class="tab-panel" id="tab-combo">
    <div class="card flat-top">
      <div style="display:flex;gap:12px">
        <div style="flex:1">
          <label class="field-label">系列A 单品数据</label>
          <textarea id="combo-input" style="height:80px"
            placeholder="粘贴系列A单品，或从Tab1系列A复制"></textarea>
        </div>
        <div style="flex:1">
          <label class="field-label">系列B 单品数据（选填，生成4/6本）</label>
          <textarea id="combo-input-b" style="height:80px"
            placeholder="粘贴系列B单品，或从Tab1系列B复制（可选）"></textarea>
        </div>
      </div>

      <div class="cfg-row">
        <label>商家编码前缀：</label>
        <input type="text" id="cfg-prefix" value="JKSWcc" placeholder="JKSWcc">
        <label>名称前缀：</label>
        <input type="text" id="cfg-nameprefix" value="SWCC/" placeholder="SWCC/">
      </div>

      <div class="toolbar">
        <button class="green" onclick="processCombo()">⚡ 生成组合装</button>
        <button style="background:#7c3aed;color:#fff;border-color:#7c3aed" onclick="goToMatch()">🔗 去平台匹配</button>
        <button style="background:#0891b2;color:#fff;border-color:#0891b2" onclick="copyComboResult()">📋 复制结果</button>
        <button onclick="exportComboCSV()">💾 导出 CSV</button>
        <span class="spacer"></span>
        <span class="stat" id="combo-stat"></span>
        <button onclick="clearCombo()">✕ 清空</button>
      </div>
    </div>

    <div class="result-card">
      <div class="table-wrap">
        <table id="combo-table">
          <thead><tr>
            <th>商家编码</th>
            <th>组合装名称</th>
            <th>单品编码</th>
            <th>单品名称</th>
            <th>数学版本</th>
            <th>系列</th>
          </tr></thead>
          <tbody id="combo-tbody">
            <tr><td colspan="6" class="empty"><div class="icon">📦</div>粘贴数据后点击「生成组合装」</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══ TAB 3: 平台SKU匹配 ═══ -->
  <div class="tab-panel" id="tab-match">

    <!-- 两栏输入 -->
    <div style="display:flex;gap:12px;margin-bottom:0" class="match-inputs">

      <!-- 左：平台SKU -->
      <div class="card flat-top" style="flex:1;min-width:0">
        <label class="field-label">① 平台SKU（编码 + 名称）</label>
        <textarea id="match-input" style="height:90px"
          placeholder="示例：&#10;1922741045122&#9;一年级上(26秋),数学计算能手(北师)"></textarea>
        <div class="toolbar" style="margin-top:8px">
          <button class="primary" onclick="processMatch()">🔗 解析并匹配</button>
          <button style="background:#0891b2;color:#fff;border-color:#0891b2" onclick="copyMatchResult()">📋 复制</button>
          <button onclick="exportMatchCSV()">💾 导出</button>
          <span class="spacer"></span>
          <span class="stat" id="match-stat"></span>
          <button onclick="clearMatch()">✕ 清空</button>
        </div>
      </div>

      <!-- 右：历史组合装 -->
      <div class="card" style="flex:1;min-width:0;border-top-left-radius:var(--radius)">
        <label class="field-label">② 历史组合装（可从Tab2同步或手动粘贴）</label>
        <textarea id="history-combo-input" style="height:90px"
          placeholder="粘贴历史组合装导出数据（4列格式）：&#10;商家编码[Tab]组合装名称[Tab]单品编码[Tab]单品名称&#10;每个组合装占多行（几本就几行），直接从之前导出的CSV/复制结果粘贴即可"></textarea>
        <div class="toolbar" style="margin-top:8px">
          <button onclick="loadHistoryCombo()">📥 载入历史组合装</button>
          <span class="spacer"></span>
          <span class="stat" id="history-stat"></span>
          <button onclick="document.getElementById('history-combo-input').value='';historyComboGroups=[];document.getElementById('history-stat').innerHTML=''">✕ 清空</button>
        </div>
      </div>

    </div>

    <div class="result-card">
      <div class="table-wrap">
        <table id="match-table">
          <thead><tr>
            <th>平台SKU编码</th>
            <th>平台SKU名称</th>
            <th>匹配类型</th>
            <th>匹配编码</th>
            <th>匹配名称</th>
            <th>系列</th>
          </tr></thead>
          <tbody id="match-tbody">
            <tr><td colspan="5" class="empty"><div class="icon">🔗</div>填入平台SKU后点击「解析并匹配」</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /page -->

<script>
// ════════════════════════════════════════════
//  拼音首字母表（仅常用教育词汇，够用即可）
// ════════════════════════════════════════════
const PINYIN_MAP = {
  '默':'m','写':'x','能':'n','手':'s','计':'j','算':'s','英':'y','语':'y','数':'s',
  '通':'t','典':'d','提':'t','优':'y','训':'x','练':'l','实':'s','验':'y','班':'b',
  '北':'b','师':'s','人':'r','教':'j','全':'q','国':'g','苏':'s','冀':'j','青':'q',
  '岛':'d','默':'m','写':'x','阅':'y','读':'d','作':'z','文':'w','理':'l','化':'h',
  '史':'s','地':'d','物':'w','生':'s','政':'z','综':'z','合':'h','多':'d','科':'k',
  '上':'s','下':'x','春':'c','秋':'q','专':'z','项':'x','强':'q','化':'h','基':'j',
  '础':'c','拔':'b','高':'g','小':'x','中':'z','学':'x','同':'t','步':'b','课':'k',
  '堂':'t','能':'n','力':'l','思':'s','维':'w','数':'s','学':'x','习':'x','题':'t',
};

function getInitials(str) {
  // 取字符串中每个汉字的拼音首字母
  let result = '';
  for (const ch of str) {
    if (PINYIN_MAP[ch]) result += PINYIN_MAP[ch];
  }
  return result || str.slice(0,4).toLowerCase();
}

// ════════════════════════════════════════════
//  核心解析（复用）
// ════════════════════════════════════════════
const SUBJECT_PRIORITY = {'语':0,'数':1,'英':2,'政':3,'科':4,'其他':99};
const SUBJECT_LABEL    = {'语':'语文','数':'数学','英':'英语','政':'政治','科':'综合/多科','其他':'其他'};
const CN2N = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
const N2CN = {1:'一',2:'二',3:'三',4:'四',5:'五',6:'六',7:'七',8:'八',9:'九'};
const SUBJ_CHARS = '语数英政科理化史地物生';
const TAIL_JUNK  = /(-新书预售|-MX|-[A-Z]{1,3})(\b|$)/gi;

// ── 书名关键词→科目推断（当年级段没有明确科目字时使用）──
const SERIES_SUBJ_RULES = [
  { keys: ['英语','英文','字母','phonics','pep'], subj: '英' },
  { keys: ['语文','默写','阅读','作文','识字','写字','汉字'], subj: '语' },
  { keys: ['数学','口算','计算','乘法','除法','应用题','数'], subj: '数' },
  { keys: ['政治','道德','品德'], subj: '政' },
];
function inferSubjectFromSeries(seriesStr) {
  const s = seriesStr.toLowerCase();
  for (const {keys, subj} of SERIES_SUBJ_RULES) {
    if (keys.some(k => s.includes(k))) return subj;
  }
  return '其他';
}

function parseRecord(line) {
  line = line.trim();
  if (!line) return null;
  let sku='', name='';
  if (line.includes('\t')) {
    const idx = line.indexOf('\t');
    sku = line.slice(0,idx).trim(); name = line.slice(idx+1).trim();
  } else {
    const m = line.match(/^(\S+)\s+(.+)$/);
    if (m) { sku=m[1]; name=m[2]; } else { sku=''; name=line; }
  }
  const cleanName = name.replace(TAIL_JUNK,'').replace(/-+$/,'').trim();
  const tailMatch = name.match(/(-新书预售|-MX|-[A-Z]{1,3})+(\b|$)/i);
  const tag = tailMatch ? tailMatch[0].replace(/^-+/,'').trim() : '';

  const parts = cleanName.split('-').map(s=>s.trim()).filter(Boolean);
  let gradeNum=99, subject='其他', term='上', edition='', seriesName='', parsed=false;

  for (let i=parts.length-1; i>=0; i--) {
    const seg = parts[i];
    const m = seg.match(new RegExp(`^([一二三四五六七八九])([${SUBJ_CHARS}]?)([上下])$`));
    if (m) {
      gradeNum = CN2N[m[1]]||99;
      const sc = m[2];
      term = m[3];
      edition    = i>0 ? parts[i-1] : '';
      seriesName = i>1 ? parts[i-2] : (i>0 ? parts[0] : '');

      if (sc !== '' && '语数英政科'.includes(sc)) {
        subject = sc;
      } else if (sc !== '') {
        subject = '科'; // 理化史地物生 → 综合
      } else {
        // 年级段没有科目字（如"一上"）→ 从系列名推断
        const inferred = inferSubjectFromSeries(seriesName + ' ' + parts.slice(0,i).join(' '));
        subject = inferred !== '其他' ? inferred : '科';
      }

      parsed = true;
      break;
    }
  }

  return {sku, name, cleanName, tag, subject, gradeNum, term, edition, seriesName, parsed};
}

// ════════════════════════════════════════════
//  排序逻辑：版本→科目→年级→学期→SKU
// ════════════════════════════════════════════
function defaultSort(a,b) {
  const ec = a.edition.localeCompare(b.edition,'zh');
  if (ec!==0) return ec;
  const pa=SUBJECT_PRIORITY[a.subject]??99, pb=SUBJECT_PRIORITY[b.subject]??99;
  if (pa!==pb) return pa-pb;
  if (a.gradeNum!==b.gradeNum) return a.gradeNum-b.gradeNum;
  const ta=a.term==='上'?0:1, tb=b.term==='上'?0:1;
  if (ta!==tb) return ta-tb;
  return a.sku.localeCompare(b.sku,undefined,{numeric:true});
}

// ════════════════════════════════════════════
//  Tab 切换
// ════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const panels=['sort','combo','match'];
    t.classList.toggle('active', panels[i]===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>{
    p.classList.toggle('active', p.id==='tab-'+name);
  });
}

// 跳转到平台匹配Tab，并把组合装数据写入历史组合装输入框
function goToMatch() {
  if (!comboGroups.length) { showToast('请先生成组合装'); return; }
  // 当次生成的组合装已在 comboGroups 中，直接跳转即可，无需写入历史输入框
  switchTab('match');
  showToast(`✓ 已跳转，当次 ${comboGroups.length} 个组合装自动参与匹配`);
}

// ════════════════════════════════════════════
//  TAB 1 – 单品排序
// ════════════════════════════════════════════
let sortRecords=[], sortRecordsB=[], sortCol=null, sortDir=1;

function _parseSortRaw(raw) { return raw.split(/\r?\n/).map(parseRecord).filter(Boolean); }
function _statHtml(records, elId) {
  const failed=records.filter(r=>!r.parsed).length;
  document.getElementById(elId).innerHTML = records.length
    ? `共 <strong>${records.length}</strong> 条${failed?`，<span style="color:var(--warn)">${failed} 条未识别</span>`:''}`
    : '';
}

function processSort() {
  sortRecords = _parseSortRaw(document.getElementById('sort-input').value);
  sortCol=null; sortDir=1; updateSortHeaders();
  sortRecords.sort(defaultSort);
  const rawB = document.getElementById('sort-input-b').value.trim();

// ════════════════════════════════════════════
//  TAB 2 – 组合装生成
// ════════════════════════════════════════════
let comboGroups=[];

// ── 版本体系规则表 ──────────────────────────
// 以语文版本为锚点，定义允许搭配的数学版本和英语版本关键词
// 用 includes 匹配，支持"全国人教"/"江苏专用"等变体
// ── 语文版本配对规则 ─────────────────────────────
// 核心逻辑：
//   苏教系语文（含苏教/江苏）→ 只能配苏教数学 + 译林英语
//   其他语文（人教/通用/无苏教字样）→ 数学不限制，英语配人教系
function isSujiaoYu(yuEdition) {
  return ['苏教','江苏'].some(k => yuEdition.includes(k));
}

// 语文+数学是否允许配对
function yuShuAllowed(yuEd, shuEd) {
  if (isSujiaoYu(yuEd)) return isSujiaoEd(shuEd) && !isWuSiZhiEd(shuEd);
  return true;
}
// 语文+英语是否允许配对
function yuYingAllowed(yuEd, yingEd) {
  if (isSujiaoYu(yuEd)) return parseEditionSpec(yingEd).base === '译林';
  return parseEditionSpec(yingEd).base !== '译林';
}

// ══════════════════════════════════════════════════════
//  版本规格归一化系统
//  规格 = 版本主体 + 变体标记（五四制等）
//  "青岛版" = "青岛"（同规格），"青岛（五四制）" ≠ "青岛"（不同规格）
// ══════════════════════════════════════════════════════

// 规格变体标记（优先级从高到低匹配）
const EDITION_VARIANTS = ['五四制','江苏专用','江苏版'];

// 版本主体规则表（按优先级排列，长/具体的放前面）
// blocked=true 表示该英语版本不参与组合
const EDITION_BASES = [
  // ── 需要优先匹配的复合词（防止被短词截断）──
  {key:'全国人教',  tag:'人教',   blocked:false},
  {key:'人教精通',  tag:'人教精通',blocked:true },  // 精通必须先于"人教"匹配
  {key:'人教版精通',tag:'人教精通',blocked:true },
  {key:'精通版',    tag:'人教精通',blocked:true },
  {key:'沪教牛津',  tag:'沪教牛津',blocked:true },
  // ── 普通版本 ──
  {key:'人教',      tag:'人教',   blocked:false},
  {key:'苏教',      tag:'苏教',   blocked:false},
  {key:'北师',      tag:'北师',   blocked:false},
  {key:'译林',      tag:'译林',   blocked:false},
  {key:'外研',      tag:'外研',   blocked:false},
  {key:'青岛',      tag:'青岛',   blocked:false},
  {key:'冀教',      tag:'冀教',   blocked:false},
  {key:'沪教',      tag:'沪教',   blocked:false},
  // ── 黑名单英语版本 ──
  {key:'闽教',      tag:'闽教',   blocked:true },
  {key:'精通',      tag:'人教精通',blocked:true },
  {key:'鲁科',      tag:'鲁科',   blocked:true },
  {key:'剑桥',      tag:'剑桥',   blocked:true },
  {key:'牛津',      tag:'牛津',   blocked:true },
];

// 解析版本字段 → 规格对象
function parseEditionSpec(ed) {
  // 1. 提取变体标记（五四制等）
  let variant = '';
  for (const v of EDITION_VARIANTS) {
    if (ed.includes(v)) { variant = v; break; }
  }
  // 2. 去掉括号内容和"版"字后匹配主体
  const edClean = ed.replace(/[（(][^）)]*[）)]/g,'').replace(/版$/,'').trim();
  let tag = '', blocked = false;
  for (const b of EDITION_BASES) {
    if (ed.includes(b.key) || edClean.includes(b.key)) {
      tag = b.tag; blocked = b.blocked; break;
    }
  }
  if (!tag) { tag = edClean || ed; blocked = false; }

  return {
    base:      tag,
    variant:   variant,
    specKey:   tag + (variant ? '+'+variant : ''),
    isBlocked: blocked,
    isWuSiZhi: variant === '五四制',
    isSujiao:  tag === '苏教' || ed.includes('江苏'),
    // 主流英语：非黑名单 且 是已知英语版本
    isMainEng: !blocked && ['人教','译林','外研','北师'].includes(tag),
  };
}

// 两个版本是否属于同一规格（base相同 且 variant相同）
function sameSpec(edA, edB) {
  const a = parseEditionSpec(edA), b = parseEditionSpec(edB);
  return a.base===b.base && a.variant===b.variant;
}

// ── 便捷判断 ─────────────────────────────────────
function isSujiaoEd(ed)  { return parseEditionSpec(ed).isSujiao; }
function isWuSiZhiEd(ed) { return parseEditionSpec(ed).isWuSiZhi; }
function isEngBlocked(ed) { return !parseEditionSpec(ed).isMainEng; }

// 传统语文可配对的数学：人教系→人教/北师，苏教系→苏教，五四制→同五四制规格
function isTraditionalShu(shuEd) {
  const s = parseEditionSpec(shuEd);
  return ['人教','北师','苏教'].includes(s.base);
}

// ── 语文参与组合的条件 ──────────────────────────
// 只有人教系/苏教系/五四制语文参与，黑名单语文不参与
const YU_BLOCKED_TAGS = ['_blocked','闽教','鲁科'];
function comboYuAllowed(yuEd) {
  const s = parseEditionSpec(yuEd);
  return !YU_BLOCKED_TAGS.includes(s.base);
}

// ── 核心配对（以语文为锚点）────────────────────
function buildCombosForYu(yuw, shuList, engList, allYuList) {
  const results = [];
  const yuEd   = yuw.edition;
  const yuSpec = parseEditionSpec(yuEd);

  if (!comboYuAllowed(yuEd)) return results;

  // ── 优先级1：五四制体系 ──────────────────────
  if (yuSpec.isWuSiZhi) {
    const wuSiShu = shuList.filter(s=>sameSpec(yuEd, s.edition));
    for (const shu of wuSiShu) {
      const wuSiEng = engList.filter(e=>sameSpec(shu.edition, e.edition) && !isEngBlocked(e.edition));
      if (wuSiEng.length) {
        for (const eng of wuSiEng) results.push([yuw, shu, eng]);
      } else {
        results.push([yuw, shu]);
      }
    }
    return results;
  }

  // ── 优先级2：苏教系语文 ──────────────────────
  if (yuSpec.isSujiao) {
    const suShu = shuList.filter(s=>{
      const ss=parseEditionSpec(s.edition);
      return ss.isSujiao && !ss.isWuSiZhi;
    });
    for (const shu of suShu) {
      results.push([yuw, shu]);
      const yilinEng = engList.filter(e=>{
        const es=parseEditionSpec(e.edition);
        return es.base==='译林' && !es.isWuSiZhi && !es.isBlocked;
      });
      for (const eng of yilinEng) results.push([yuw, shu, eng]);
    }
    return results;
  }

  // ── 优先级3：人教系语文 ──────────────────────
  const tradShu = shuList.filter(s=>{
    const ss=parseEditionSpec(s.edition);
    return isTraditionalShu(s.edition) && !ss.isWuSiZhi && !ss.isSujiao;
  });
  for (const shu of tradShu) {
    results.push([yuw, shu]);
    // 3本：仅人教英语（不含外研/译林/精通等）
    const validEng = engList.filter(e=>{
      const es=parseEditionSpec(e.edition);
      return es.base==='人教' && !es.isBlocked && !es.isWuSiZhi;
    });
    for (const eng of validEng) results.push([yuw, shu, eng]);
  }

  // ── 优先级3b：人教语文+苏教数学 ─────────────
  // 条件：当前语文是人教系，数据里没有苏教语文（即苏教数学没有专属语文可配）
  const hasSujiaoYu = allYuList.some(y=>parseEditionSpec(y.edition).isSujiao);
  if (!hasSujiaoYu) {
    // 数据里没有苏教语文，人教语文可以和苏教数学组合
    const suShu = shuList.filter(s=>{
      const ss=parseEditionSpec(s.edition);
      return ss.isSujiao && !ss.isWuSiZhi;
    });
    for (const shu of suShu) {
      results.push([yuw, shu]);
      // 译林英语
      const yilinEng = engList.filter(e=>{
        const es=parseEditionSpec(e.edition);
        return es.base==='译林' && !es.isWuSiZhi && !es.isBlocked;
      });
      for (const eng of yilinEng) results.push([yuw, shu, eng]);
    }
  }

  // ── 优先级4：其他版本数学（青岛/冀教等）────
  const otherShu = shuList.filter(s=>{
    const ss=parseEditionSpec(s.edition);
    return !ss.isWuSiZhi && !ss.isSujiao && !isTraditionalShu(s.edition);
  });
  for (const shu of otherShu) {
    results.push([yuw, shu]);
    const sameEng = engList.filter(e=>
      sameSpec(shu.edition, e.edition) && !isEngBlocked(e.edition)
    );
    for (const eng of sameEng) results.push([yuw, shu, eng]);
  }

  return results;
}

// ── 商家编码 ─────────────────────────────────
// 同批次3位随机英文（生成时固定，整批相同，用于区分不同批次）
let _batchRandLetters = '';
function getBatchRandLetters() {
  if (!_batchRandLetters) {
    const chars = 'abcdefghijklmnopqrstuvwxyz';
    _batchRandLetters = Array.from({length:3}, ()=>chars[Math.floor(Math.random()*26)]).join('');
  }
  return _batchRandLetters;
}

// 组合装序号（每次processCombo重置）
let _comboSeq = 0;

// 生成编码前缀（不含序号），序号在排序后统一赋值
function genMerchantCodePrefix(records, prefix) {
  const initials = [...new Set(records.map(r=>getInitials(r.seriesName)).join(''))].join('').slice(0,4);
  const letters  = getBatchRandLetters();
  return prefix + initials + letters;
}

// ── 系列名简化 ───────────────────────────────
// 规则：第一本全称，后续各本只保留与第一本不同的核心词
// 做法：找所有系列名的公共前缀词和公共后缀词，后续只取差异中间部分
function buildSeriesStr(seriesNames) {
  if (seriesNames.length === 1) return seriesNames[0];
  const first = seriesNames[0];
  // 将系列名拆成字符数组，找公共前缀长度
  let prefixLen = 0;
  for (let i = 0; i < first.length; i++) {
    if (seriesNames.every(s => s[i] === first[i])) prefixLen = i+1;
    else break;
  }
  // 找公共后缀长度
  let suffixLen = 0;
  const rev = s => s.split('').reverse().join('');
  const revFirst = rev(first);
  for (let i = 0; i < revFirst.length; i++) {
    if (seriesNames.every(s => rev(s)[i] === revFirst[i])) suffixLen = i+1;
    else break;
  }
  // 第一本全称，后续各本截取差异部分（去掉公共前缀和后缀）
  const diffStart = prefixLen;
  const diffEnd   = s => s.length - suffixLen;
  const rest = seriesNames.slice(1).map(s => {
    const diff = s.slice(diffStart, diffEnd(s));
    return diff || s; // 如果差异为空则用原名
  });
  return [first, ...rest].join('+');
}

// ── 组合装名称 ───────────────────────────────
// 目标格式：SWCC/26秋-通典默写能手+计算-人教-一语+数上
//           SWCC/26秋-通典默写能手+计算-人教语+北师数-一语+数上（跨版本）
function buildComboName(records, namePrefix) {
  // 按科目优先级排序：语→数→英
  const sorted = [...records].sort((a,b)=>(SUBJECT_PRIORITY[a.subject]??99)-(SUBJECT_PRIORITY[b.subject]??99));
  const r0 = sorted[0];

  const season = r0.cleanName.split('-')[0]?.trim() || '';
  const grade  = N2CN[r0.gradeNum] || '';
  const term   = r0.term;

  // 系列名：去重后简化
  const seriesNames = [...new Set(sorted.map(r=>r.seriesName))];
  const seriesStr   = buildSeriesStr(seriesNames);

  // 版本：同版本写一次；不同版本写"版本+科目"
  const editions = sorted.map(r=>r.edition);
  const allSame  = editions.every(e=>e===editions[0]);

  // 科目拼接
  const subjStr = sorted.map(r=>r.subject).join('+');

  if (allSame) {
    // 同版本：SWCC/26秋-系列-人教-一语+数上-2本
    return `${namePrefix}${season}-${seriesStr}-${editions[0]}-${grade}${subjStr}${term}-${sorted.length}本`;
  } else {
    // 跨版本：SWCC/26秋-系列-人教语+北师数-一上-2本
    const edSubj = sorted.map(r=>`${r.edition}${r.subject}`).join('+');
    return `${namePrefix}${season}-${seriesStr}-${edSubj}-${grade}${term}-${sorted.length}本`;
  }
}

// ── 组合装排序：数学版本 → 语数2本1-6 → 语数英3本1-6 → 学期 ──
function comboSort(a, b) {
  // 第一键：系列（A→B→A+B）
  const seriesOrder = {'A':0,'B':1,'A+B':2};
  const sa = seriesOrder[a.seriesType??'A']??0, sb = seriesOrder[b.seriesType??'A']??0;
  if (sa !== sb) return sa - sb;
  // 第二键：数学版本
  const mathA = a.items.find(r=>r.subject==='数')?.edition || '';
  const mathB = b.items.find(r=>r.subject==='数')?.edition || '';
  const ec = mathA.localeCompare(mathB, 'zh');
  if (ec !== 0) return ec;
  // 第三键：本数（2本先，3本后）
  if (a.items.length !== b.items.length) return a.items.length - b.items.length;
  // 第四键：年级
  const gradeA = a.items.find(r=>r.subject==='数')?.gradeNum ?? 99;
  const gradeB = b.items.find(r=>r.subject==='数')?.gradeNum ?? 99;
  if (gradeA !== gradeB) return gradeA - gradeB;
  // 第五键：学期
  const termA = (a.items.find(r=>r.subject==='数')?.term==='上') ? 0 : 1;
  const termB = (b.items.find(r=>r.subject==='数')?.term==='上') ? 0 : 1;
  return termA - termB;
}

function processCombo() {
  const prefix  = document.getElementById('cfg-prefix').value.trim() || 'JKSWcc';
  const namePfx = document.getElementById('cfg-nameprefix').value.trim() || 'SWCC/';
  _batchRandLetters = '';

  const rawA = document.getElementById('combo-input').value;
  const rawB = document.getElementById('combo-input-b').value.trim();
  const recordsA = rawA.split(/\r?\n/).map(parseRecord).filter(r=>r&&r.parsed);

  if (!recordsA.length) { showToast('没有可解析的数据'); return; }

  const combos = [];

  // ── 模式1：只有系列A，走原有2/3本逻辑 ──────────────────
  if (!rawB) {
    const groupMap = {};
    for (const r of recordsA) {
      const key = `${r.gradeNum}||${r.term}`;
      if (!groupMap[key]) groupMap[key] = [];
      groupMap[key].push(r);
    }
    for (const grp of Object.values(groupMap)) {
      const bySubj = {};
      for (const r of grp) {
        if (!bySubj[r.subject]) bySubj[r.subject] = [];
        bySubj[r.subject].push(r);
      }
      if (bySubj['语'] && bySubj['数']) {
        const engList = bySubj['英'] || [];
        for (const yuw of bySubj['语']) {
          const itemsList = buildCombosForYu(yuw, bySubj['数'], engList, bySubj['语']);
          for (const items of itemsList) {
            combos.push({ merchantCode: genMerchantCodePrefix(items, prefix), comboName: buildComboName(items, namePfx), items, seriesType:'A' });
          }
        }
      }
    }

  } else {
    // ── 模式2：系列A + 系列B，生成4/6本跨系列组合 ─────────
    const recordsB = rawB.split(/\r?\n/).map(parseRecord).filter(r=>r&&r.parsed);
    if (!recordsB.length) { showToast('系列B数据无法解析'); return; }

    // 先各自生成2/3本（系列A内部、系列B内部）
    for (const [recs, label] of [[recordsA,'A'],[recordsB,'B']]) {
      const groupMap = {};
      for (const r of recs) {
        const key = `${r.gradeNum}||${r.term}`;
        if (!groupMap[key]) groupMap[key] = [];
        groupMap[key].push(r);
      }
      for (const grp of Object.values(groupMap)) {
        const bySubj = {};
        for (const r of grp) {
          if (!bySubj[r.subject]) bySubj[r.subject] = [];
          bySubj[r.subject].push(r);
        }
        if (bySubj['语'] && bySubj['数']) {
          const engList = bySubj['英'] || [];
          for (const yuw of bySubj['语']) {
            const itemsList = buildCombosForYu(yuw, bySubj['数'], engList, bySubj['语']);
            for (const items of itemsList) {
              combos.push({ merchantCode: genMerchantCodePrefix(items, prefix), comboName: buildComboName(items, namePfx), items, seriesType: label });
            }
          }
        }
      }
    }

    // 跨系列4/6本组合：版本一致，数学仅限人教/北师/苏教三系
    const mapA = {}, mapB = {};
    for (const r of recordsA) {
      const key = `${r.gradeNum}||${r.term}`;
      if (!mapA[key]) mapA[key] = {};
      if (!mapA[key][r.subject]) mapA[key][r.subject] = [];
      mapA[key][r.subject].push(r);
    }
    for (const r of recordsB) {
      const key = `${r.gradeNum}||${r.term}`;
      if (!mapB[key]) mapB[key] = {};
      if (!mapB[key][r.subject]) mapB[key][r.subject] = [];
      mapB[key][r.subject].push(r);
    }

    // 允许参与跨系列的数学版本：仅限传统三系（人教/北师/苏教）且非五四制
    function crossShuAllowed(shuEd) {
      const sp = parseEditionSpec(shuEd);
      return ['人教','北师','苏教'].includes(sp.base) && !sp.isWuSiZhi;
    }

    for (const key of Object.keys(mapA)) {
      if (!mapB[key]) continue;
      const byA = mapA[key], byB = mapB[key];
      if (!byA['语'] || !byA['数'] || !byB['语'] || !byB['数']) continue;

      for (const yuA of byA['语']) {
        for (const shuA of byA['数']) {
          if (!yuShuAllowed(yuA.edition, shuA.edition)) continue;
          if (!crossShuAllowed(shuA.edition)) continue; // 仅传统三系数学

          // B系列：语文版本=A，数学版本=A（完全一致）
          for (const yuB of byB['语']) {
            if (!sameSpec(yuA.edition, yuB.edition)) continue;
            for (const shuB of byB['数']) {
              if (!sameSpec(shuA.edition, shuB.edition)) continue;
              if (!yuShuAllowed(yuB.edition, shuB.edition)) continue;

              // 4本
              const items4 = [yuA, shuA, yuB, shuB];
              combos.push({ merchantCode: genMerchantCodePrefix(items4, prefix), comboName: buildComboNameMulti(items4, namePfx), items: items4, seriesType:'A+B' });

              // 6本：英语遵循单系列规则（yuYingAllowed），且A英=B英版本
              // A+B英语：遵循单系列规则，且仅限人教/译林（不含外研等）
              const validEngBase = isSujiaoEd(shuA.edition) ? ['译林'] : ['人教'];
              const engA = (byA['英']||[]).filter(e=>{
                const eb=parseEditionSpec(e.edition);
                return validEngBase.includes(eb.base) && !eb.isBlocked && !eb.isWuSiZhi;
              });
              const engB = (byB['英']||[]).filter(e=>{
                const eb=parseEditionSpec(e.edition);
                return validEngBase.includes(eb.base) && !eb.isBlocked && !eb.isWuSiZhi;
              });
              for (const eA of engA) {
                for (const eB of engB) {
                  if (!sameSpec(eA.edition, eB.edition)) continue;
                  const items6 = [yuA, shuA, eA, yuB, shuB, eB];
                  combos.push({ merchantCode: genMerchantCodePrefix(items6, prefix), comboName: buildComboNameMulti(items6, namePfx), items: items6, seriesType:'A+B' });
                }
              }
            }
          }
        }
      }
    }
  }

  combos.sort(comboSort);
  combos.forEach((c, i) => { c.merchantCode = c.merchantCode + String(i+1).padStart(4,'0'); });
  comboGroups = combos;
  renderComboTable(combos);
  const el = document.getElementById('combo-stat');
  el.innerHTML = combos.length
    ? `共生成 <strong>${combos.length}</strong> 个组合装，<strong>${combos.reduce((s,c)=>s+c.items.length,0)}</strong> 行`
    : '未找到可配对的组合';
}

// ── 多系列组合装名称（4本/6本）────────────────────
// 格式：SWCC/26秋-提优训练+大考卷-人教语+北师数-一上-4本
function buildComboNameMulti(items, namePrefix) {
  // 按科目分组，提取年级/学期
  const season = items[0].cleanName.split('-')[0]?.trim() || '';
  const grade  = N2CN[items[0].gradeNum] || '';
  const term   = items[0].term;

  // 系列名（去重，按原顺序）
  const seriesNames = [...new Set(items.map(r=>r.seriesName))];
  const seriesStr   = buildSeriesStr(seriesNames);

  // 版本：取语文版本+数学版本（不重复）
  const yuEd  = items.find(r=>r.subject==='语')?.edition || '';
  const shuEd = items.find(r=>r.subject==='数')?.edition || '';
  const engEd = items.find(r=>r.subject==='英')?.edition || '';
  let edStr;
  if (yuEd === shuEd && (!engEd || engEd === yuEd)) {
    edStr = yuEd;
  } else {
    const parts = [];
    if (yuEd) parts.push(yuEd+'语');
    if (shuEd && shuEd!==yuEd) parts.push(shuEd+'数');
    if (engEd && engEd!==shuEd) parts.push(engEd+'英');
    edStr = parts.join('+');
  }

  return `${namePrefix}${season}-${seriesStr}-${edStr}-${grade}${term}-${items.length}本`;
}

// 将多个科目数组做笛卡尔积配对（每科选一本）
function makePairs(arrays) {
  return arrays.reduce((acc, arr) => {
    const result = [];
    for (const a of acc) {
      for (const b of arr) result.push([...a, b]);
    }
    return result;
  }, [[]]);
}

function renderComboTable(combos) {
  const tbody=document.getElementById('combo-tbody');
  if (!combos.length) {
    tbody.innerHTML=`<tr><td colspan="6" class="empty"><div class="icon">📦</div>未找到可配对的组合</td></tr>`;
    return;
  }
  const rows=[];
  const SERIES_COLORS = {
    'A':   'background:#e0f2fe;color:#075985',
    'B':   'background:#fef3c7;color:#92400e',
    'A+B': 'background:#ede7f6;color:#4527a0',
  };
  combos.forEach((c,ci)=>{
    const mathEdition = c.items.find(r=>r.subject==='数')?.edition || '—';
    const st = c.seriesType || 'A';
    const seriesBadge = `<span class="badge" style="${SERIES_COLORS[st]||''};white-space:nowrap">${esc(st)}</span>`;
    c.items.forEach((item,ii)=>{
      const rowClass = ci%2===0 ? 'combo-row-a' : 'combo-row-b';
      const divider  = (ii===0 && ci>0) ? ' group-divider' : '';
      rows.push(`<tr class="${rowClass}${divider}">
        <td><code>${esc(c.merchantCode)}</code></td>
        <td>${esc(c.comboName)}</td>
        <td><code>${esc(item.sku)}</code></td>
        <td>${esc(item.name)}</td>
        <td><span class="badge b数" style="white-space:nowrap">${esc(mathEdition)}</span></td>
        <td>${seriesBadge}</td>

  tbody.innerHTML=rows.join('');

// ════════════════════════════════════════════
//  通用工具

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doClipboard(text,msg) {
  (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject())
    .then(()=>showToast(msg))
    .catch(()=>{
      const ta=Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');showToast(msg);}catch{showToast('复制失败，请手动复制');}
      document.body.removeChild(ta);
    });
}

function downloadCSV(filename, content) {
  const blob=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=Object.assign(document.createElement('a'),{href:url,download:filename});
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

// ════════════════════════════════════════════
//  TAB 3 – 平台SKU匹配
// ════════════════════════════════════════════

// 解析平台SKU名称格式：一年级上(26秋),数学计算能手(北师)
// 返回 { gradeNum, term, subjectDesc, edition }
// ── 版本规范化：统一成可比较的系别关键词 ────────
// 返回一组标签，用于集合交叉判断
function editionTags(ed) {
  ed = ed.toLowerCase();
  const tags = new Set();
  if (ed.includes('苏教') || ed.includes('江苏')) { tags.add('苏教系'); }
  else if (ed.includes('人教')) { tags.add('人教系'); }
  if (ed.includes('北师'))  tags.add('北师系');
  if (ed.includes('译林'))  tags.add('译林系');
  if (ed.includes('青岛'))  tags.add('青岛系');
  if (ed.includes('冀教'))  tags.add('冀教系');
  if (ed.includes('外研'))  tags.add('外研系');
  // 没有任何标签时用原始值作为fallback
  if (tags.size===0) tags.add(ed);
  return tags;
}

// 两个版本字段是否属于同一系别
function editionMatch(edKw, rEd) {
  if (!edKw) return true;
  const a = editionTags(edKw), b = editionTags(rEd);
  // 标签交集匹配（苏教系≠人教系，不会误匹）
  for (const t of a) { if (b.has(t)) return true; }
  // fallback：仅在双方都没有已知系别标签时才用字符串匹配
  const knownSystems = ['苏教系','人教系','北师系','译林系','外研系','冀教系','青岛系','沪教系'];
  const aHasKnown = knownSystems.some(s=>a.has(s));
  const bHasKnown = knownSystems.some(s=>b.has(s));
  if (aHasKnown || bHasKnown) return false; // 有已知系别但没命中 → 不匹配
  // 双方都是未知版本：字符串互包含
  const ek=edKw.toLowerCase(), re=rEd.toLowerCase();
  return ek.includes(re) || re.includes(ek);
}

// ── 科目识别：从名称描述判断单一科目（Tab3平台SKU用）────
// 与 SERIES_SUBJ_RULES 保持一致
const SUBJ_DESC_MAP = [
  {keys:['英语','英文','字母','phonics','pep'], subj:'英'},
  {keys:['语文','默写','阅读','作文','识字','写字','汉字'], subj:'语'},
  {keys:['数学','口算','计算','乘法','除法','应用题'], subj:'数'},
  {keys:['政治','道德','品德'], subj:'政'},
  {keys:['综合'], subj:'科'},
];
function descToSubject(desc) {
  const d = desc.toLowerCase();
  for (const {keys,subj} of SUBJ_DESC_MAP) {
    if (keys.some(k=>d.includes(k))) return subj;
  }
  return '其他';
}

// ── 语文版本默认处理 ────────────────────────────
// 单本语文SKU：如果版本字段无苏教/江苏字样，默认视为人教系
function normalizeYuEdition(subj, edition) {
  if (subj !== '语') return edition;
  if (!edition) return '人教';
  const tags = editionTags(edition);
  // 如果没有苏教系标签，默认人教系
  if (!tags.has('苏教系')) return edition || '人教';
  return edition;
}

// ── 已知版本关键词（长的优先匹配）─────────────
const KNOWN_EDITIONS = ['苏教江苏专用','全国人教','苏教','江苏','人教','北师','译林','外研','冀教','青岛','沪教'];

function extractEditionFromDesc(desc) {
  for (const ed of KNOWN_EDITIONS) {
    if (desc.includes(ed)) {
      // 找到版本基词后，检查原始描述里是否含variant标记（五四制等）
      // 若有则拼上，让 parseEditionSpec 能正确识别规格
      const variantFound = EDITION_VARIANTS.find(v => desc.includes(v));
      return variantFound ? ed + variantFound : ed;
    }
  }
  return '';
}

// 判断一个版本字符串是否属于苏教系
function isSuJiaoEd(ed) {
  return ed.includes('苏教') || ed.includes('江苏');
}

function parsePlatformSku(line) {
  line = line.trim();
  if (!line) return null;

  let skuId='', skuName='';
  if (line.includes('	')) {
    const idx=line.indexOf('	');
    skuId=line.slice(0,idx).trim(); skuName=line.slice(idx+1).trim();
  } else {
    const m=line.match(/^(\S+)\s+(.+)$/);
    if(m){skuId=m[1];skuName=m[2];}else{skuId='';skuName=line;}
  }

  // ── 第一步：提取年级+学期 ────────────────────────
  // 支持多种格式，统一找"X年级上/下"模式
  // 先去掉【年份季节】标注、"册"字
  let nameForGrade = skuName
    .replace(/【\d{2,4}[秋春冬夏]】/g,'')
    .replace(/（[^）]*）/g,'')   // 去掉（括号说明）
    .replace(/([上下])册/g,'$1')
    .trim();

  const gtm = nameForGrade.match(/([一二三四五六七八九])年级([上下])/);
  if (!gtm) return {skuId,skuName,rawAfterComma:'',gradeNum:99,term:'上',subjects:[],editions:[],itemCount:0,subjectPart:'',parsed:false};

  const gradeNum = CN2N[gtm[1]]||99;
  const term     = gtm[2];

  // ── 第二步：取逗号后的原始内容作为排序键和解析源 ──
  const commaIdx = skuName.indexOf(',');
  const rawAfterComma = commaIdx>=0 ? skuName.slice(commaIdx+1).trim() : skuName;

  // ── 第三步：规范化逗号后内容，统一提取科目+版本 ──
  // 支持格式：
  //   A: 数学计算能手(北师)
  //   B: 【学霸默写】人教版
  //   C: 语文人教版
  //   D: 2本：语文+数学【北师版】
  //   E: 3本：语文+英语【人教】+数学【北师】
  //   F: 【2本】语文默写+数学计算苏教版
  //   G: 语文+数学(人教)

  // 从【N本】直接提取本数（最可靠，优先于subjects推断）
  const nBenMatch = rawAfterComma.match(/【(\d+)本/);
  const declaredItemCount = nBenMatch ? parseInt(nBenMatch[1]) : 0; // 0=未声明，用subjects.length

  // 清理：去掉本数标注"2本："/"【2本】"等，去掉"版"字
  let cleaned = rawAfterComma
    .replace(/【\d+本[^】]*】/g,'')   // 【2本】【3本江苏专用】
    .replace(/\d+本[：:]\s*/g,'')      // 2本：
    .replace(/([^地方省])(版)/g,'$1') // "版"字（保留"版本"里的版）
    .trim();

  // ── 第四步：拆分科目段，每段可能有内嵌【版本】或(版本) ──
  // 先把每个科目段的内嵌版本提取出来
  // 格式如：英语【人教】 → 科目=英语，版本=人教
  //         数学【北师版】 → 科目=数学，版本=北师
  //         数学计算苏教 → 科目=数学，版本=苏教（从文本提取）

  // 先找末尾统一括号（格式A/G）
  const trailingBracket = cleaned.match(/\(([^)）]+)\)\s*$/);
  const trailingEd = trailingBracket ? trailingBracket[1].trim() : '';
  if (trailingBracket) {
    cleaned = cleaned.slice(0, cleaned.lastIndexOf('(')).trim();
  }

  // 按+拆分各科目段（忽略【】内部的+）
  const rawSegs = [];
  let cur='', depth=0;
  for (const ch of cleaned) {
    if (ch==='【'||ch==='(') depth++;
    else if (ch==='】'||ch===')') depth--;
    if (ch==='+' && depth===0) { if(cur.trim()) rawSegs.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  if (cur.trim()) rawSegs.push(cur.trim());

  const subjects=[], editions=[];
  const segEditions=[];

  // 检测多系列格式：末尾有共享【语X+数Y】描述，且系列名有2个以上（用+分隔）
  // 如："提优训练+大考卷【语人教+数北师】" → 2个系列，每个系列都有语+数
  // 注意：【数学北师】或【语文+数学人教】但系列只有1个时，不走多系列展开
  const sharedSubjBracket = cleaned.match(/【([语数英][^】]*)】\s*$/);

  // 判断是否真正的多系列：括号前面的部分用+分隔出>=2个系列名
  let isMultiSeries = false;
  let multiSeriesNames = [];
  let multiSharedItems = [];
  if (sharedSubjBracket) {
    const seriesPart = cleaned.slice(0, cleaned.lastIndexOf('【')).trim();
    let sc='', sd=0;
    for(const ch of seriesPart){
      if(ch==='【'||ch==='(')sd++;else if(ch==='】'||ch===')')sd--;
      if(ch==='+'&&sd===0){if(sc.trim())multiSeriesNames.push(sc.trim());sc='';}else sc+=ch;
    }
    if(sc.trim())multiSeriesNames.push(sc.trim());

    // 解析共享科目描述
    const sharedDesc = sharedSubjBracket[1];
    for (const part of sharedDesc.split('+').map(s=>s.trim())) {
      const subjChar = part[0];
      const edPart   = part.slice(1).trim();
      const subj = '语数英政科'.includes(subjChar) ? subjChar : descToSubject(part);
      const ed   = extractEditionFromDesc(edPart) || edPart;
      multiSharedItems.push({subj, ed});
    }

    // 多系列展开条件：系列数>=2 且 共享科目数>=2（只有语文不算完整组合）
    const distinctSubjs = new Set(multiSharedItems.map(i=>i.subj));
    isMultiSeries = multiSeriesNames.length >= 2 && distinctSubjs.size >= 2;
  }

  if (isMultiSeries) {
    // 展开：每个系列 × 每个科目 = 一条记录
    for (const sName of multiSeriesNames) {
      for (const {subj, ed} of multiSharedItems) {
        subjects.push(subj);
        segEditions.push(ed);
      }
    }
  } else {
    // 原有逐段解析逻辑
    for (const seg of rawSegs) {
      const inlineBracket = seg.match(/【([^】]*)】/);
      const segClean = seg.replace(/【[^】]*】/g,'').trim();

      // 如果内嵌【】里含有科目字（如【语文+数学+英语人教】），展开为多个科目
      if (inlineBracket && /[语数英]/.test(inlineBracket[1])) {
        const innerDesc = inlineBracket[1];
        // 按+拆分：语文+数学+英语人教 → ['语文','数学','英语人教']
        for (const part of innerDesc.split('+').map(s=>s.trim())) {
          const subj = descToSubject(part) !== '其他' ? descToSubject(part) : descToSubject(segClean+part);
          const ed   = extractEditionFromDesc(part) || trailingEd;
          subjects.push(subj);
          segEditions.push(ed);
        }
      } else {
        const inlineEd = inlineBracket ? extractEditionFromDesc(inlineBracket[1]) : '';
        const descEd = extractEditionFromDesc(segClean);
        const ownEd = inlineEd || descEd || trailingEd;
        segEditions.push(ownEd);
        subjects.push(descToSubject(segClean));
      }
    }
  }

  // ── 第五步：处理全局【】标注版本（用于补全无版本的段）──
  // 从rawAfterComma里找不属于科目段的【】（如【北师版】【苏教版】）
  const allBrackets = rawAfterComma.match(/【([^】]*)】/g) || [];
  let globalTagEdition = '';
  for (const bt of allBrackets) {
    const inner = bt.replace(/【|】/g,'');
    if (/^\d+本/.test(inner)) continue; // 跳过"2本"这类
    const ed = extractEditionFromDesc(inner);
    if (ed) { globalTagEdition = ed; break; }
  }
  const globalFallback = globalTagEdition || trailingEd || '';

  // ── 第六步：逐段赋最终版本 ─────────────────────
  // 同时收集所有段的苏教版本（用于判断整体体系）
  const sujiaoInAny = segEditions.some(e=>e && isSuJiaoEd(e)) || isSuJiaoEd(globalFallback);

  for (let i=0;i<subjects.length;i++) {
    const subj  = subjects[i];
    const ownEd = segEditions[i];
    let segEd;

    if (subj==='语') {
      // 语文：只看本段自身版本词（ownEd）来决定是否苏教系
      // globalTagEdition 可能来自数学段的苏教标注，不能传染给语文
      // 例：语文+数学【苏教版】→ 语文段自身无版本 → 人教（普通语文）
      //     语文苏教+数学 → 语文段自身含苏教 → 苏教语文
      segEd = (ownEd && isSuJiaoEd(ownEd)) ? ownEd : '人教';
    } else if (subj==='英' && !ownEd && subjects.length>1) {
      // 多本英语无版本：按数学段版本推断
      const shuIdx = subjects.findIndex(s=>s==='数');
      const shuEd  = shuIdx>=0 ? (segEditions[shuIdx]||globalFallback) : globalFallback;
      segEd = isSuJiaoEd(shuEd) ? '译林' : '人教';
    } else {
      segEd = ownEd || globalFallback;
    }
    editions.push(segEd);
  }

  // 优先用声明的本数（【N本】），否则用解析出的科目数
  const itemCount = declaredItemCount || subjects.length;
  const mathIdx   = subjects.indexOf('数');
  const edition   = mathIdx>=0 ? editions[mathIdx] : (editions[0]||globalFallback);
  const subjectPart = rawSegs.join('+');

  return {skuId, skuName, rawAfterComma, gradeNum, term, subjectPart, subjects, editions, edition, itemCount, parsed:true};
}

// 平台SKU排序：逗号后内容（字典序）→ 年级
function platformSort(a, b) {
  // 1. 逗号后原始内容字典序（相同类型聚在一起）
  const rc = (a.rawAfterComma||'').localeCompare(b.rawAfterComma||'','zh');
  if (rc!==0) return rc;
  // 2. 年级
  return a.gradeNum - b.gradeNum;
}

// ── 核心匹配 ─────────────────────────────────────
//  itemCount=1 → 单品：年级+学期+科目+版本精准匹配
//  itemCount≥2 → 组合装：本数相同+科目集合完全一致+年级+学期
//                版本：重点匹数学版本（括号里给的）；英语单独检查
function matchPlatformSku(p) {
  const results=[];

  if (p.itemCount===1) {
    // ── 单品：年级+学期+科目+规格精准匹配 ──
    const subj = p.subjects[0];
    const edKw = p.editions[0] || p.edition;
    for (const r of sortRecords) {
      if (!r.parsed) continue;
      if (r.gradeNum!==p.gradeNum || r.term!==p.term) continue;
      if (subj!=='其他' && r.subject!==subj) continue;
      if (!sameSpec(edKw, r.edition)) continue;
      results.push({type:'单品', code:r.sku, name:r.cleanName||r.name, _series:'A'});
    }

  } else {

    // 判断是否A+B多系列组合
    function isMultiSeriesSku(c) { return (c.seriesType||'A') === 'A+B'; }

    // ── 提取系列关键词（从单品seriesName提取所有2字以上子串）──
    const seriesKeywords = { A:new Set(), B:new Set() };
    for (const c of comboGroups) {
      const st = c.seriesType || 'A';
      if (st==='A+B') continue;
      c.items.forEach(item=>{
        if (!item.seriesName) return;
        const sn = item.seriesName;
        // 加入完整词
        seriesKeywords[st]?.add(sn);
        // 加入所有长度>=2的连续子串（滑动窗口，支持"大考卷"匹"提优大考卷"）
        for (let start=0; start<sn.length; start++) {
          for (let len=2; len<=sn.length-start; len++) {
            seriesKeywords[st]?.add(sn.slice(start, start+len));
          }
        }
      });
    }

    // ── 判断SKU名属于哪个系列 ──
    const skuText = p.skuName + ' ' + (p.rawAfterComma||'');
    function skuHasSeries(st) {
      // SKU文本包含该系列的任意关键词（≥2字）
      return [...(seriesKeywords[st]||[])].filter(k=>k.length>=2).some(k=>skuText.includes(k));
    }
    // 防止A/B共用同名词（如两个系列都叫"提优"），取差集
    const aKws = seriesKeywords.A || new Set();
    const bKws = seriesKeywords.B || new Set();
    // 只有B系列独有、A系列没有的关键词才算B的特征词
    const bExclusive = [...bKws].filter(k=>k.length>=2 && !aKws.has(k));
    const hasA = skuHasSeries('A');
    const hasB = bExclusive.some(k=>skuText.includes(k));

    // 目标系列判断
    let targetSeries;
    if (hasA && hasB) targetSeries = 'A+B';
    else if (hasB) targetSeries = 'B';
    else targetSeries = 'A'; // 默认A

    // ── versionCheck：支持4本/6本（科目数量用组合装本数，而非平台SKU科目数）──
    function versionCheck(c) {
      // 本数必须一致
      if (c.items.length !== p.itemCount) return false;
      // 年级+学期（取数学单品）
      const refItem = c.items.find(i=>i.subject==='数') || c.items[0];
      if (!refItem || refItem.gradeNum!==p.gradeNum || refItem.term!==p.term) return false;
      // 版本验证：平台SKU每个科目版本，和组合装中该科目的任一单品版本匹配即可
      // （4本中语文有2本但版本一致，只需匹到其中一本）
      const pEdMap = {}; // {科目: 版本}
      for (let i=0; i<p.subjects.length; i++) {
        const subj=p.subjects[i], ed=p.editions[i]||p.edition;
        if (ed && !pEdMap[subj]) pEdMap[subj]=ed; // 取第一个非空版本
      }
      for (const [subj, pEd] of Object.entries(pEdMap)) {
        if (!pEd) continue;
        const cItems = c.items.filter(i=>i.subject===subj);
        if (!cItems.length) return false;
        if (!cItems.some(ci=>sameSpec(pEd, ci.edition))) return false;
      }
      return true;
    }

    // ── 执行匹配 ──
    if (targetSeries === 'A+B') {
      const abResults = comboGroups.filter(c=>isMultiSeriesSku(c) && versionCheck(c));
      results.push(...abResults.map(c=>({type:`组合装${p.itemCount}本`, code:c.merchantCode, name:c.comboName, _series:'A+B'})));
    } else {
      const singleResults = comboGroups.filter(c=>(c.seriesType||'A')===targetSeries && !isMultiSeriesSku(c) && versionCheck(c));
      results.push(...singleResults.map(c=>({type:`组合装${p.itemCount}本`, code:c.merchantCode, name:c.comboName, _series:targetSeries})));
    }

    // 历史组合装
    const currentCodes = new Set(comboGroups.map(c=>c.merchantCode));
    const histFiltered = historyComboGroups.filter(c=>!currentCodes.has(c.merchantCode) && versionCheck(c));
    if (histFiltered.length) {
      results.push(...histFiltered.map(c=>({type:`历史组合装${p.itemCount}本`, code:c.merchantCode, name:c.comboName, _series:'历史'})));
    }
  }

  return results;
}

let matchRecords = [];
let historyComboGroups = []; // 从历史组合装输入框解析的组合装

// 解析历史组合装输入（格式：商家编码	组合装名称	单品编码	单品名称）
function loadHistoryCombo() {
  const raw = document.getElementById('history-combo-input').value.trim();
  if (!raw) { showToast('请先粘贴历史组合装数据'); return; }
  const lines = raw.split(/\r?\n/).filter(l=>l.trim());
  const map = {};
  for (const line of lines) {
    const parts = line.split('\t');
    if (parts.length < 2) continue;
    const code = parts[0].trim();
    const name = parts[1].trim();
    const skuId = parts[2]?.trim() || '';
    const skuName = parts[3]?.trim() || '';
    if (!map[code]) map[code] = { merchantCode:code, comboName:name, items:[] };
    if (skuId) {
      // 尝试从单品名称解析科目和版本（复用parseRecord）
      const parsed = parseRecord(skuId + '\t' + skuName);
      map[code].items.push(parsed || {sku:skuId, name:skuName, subject:'其他', gradeNum:99, term:'上', edition:'', parsed:false});
    }
  }
  historyComboGroups = Object.values(map);
  document.getElementById('history-stat').innerHTML =
    `已载入 <strong>${historyComboGroups.length}</strong> 个历史组合装`;
  showToast(`✓ 载入 ${historyComboGroups.length} 个历史组合装`);
}

function processMatch() {
  // 自动解析历史组合装输入框（无需手动点载入）
  const historyRaw = document.getElementById('history-combo-input').value.trim();
  if (historyRaw) loadHistoryCombo();

  const raw = document.getElementById('match-input').value;
  const lines = raw.split(/\r?\n/).map(parsePlatformSku).filter(Boolean);
  lines.sort(platformSort);
  matchRecords = lines;

  const tbody = document.getElementById('match-tbody');
  if (!lines.length) {
    tbody.innerHTML=`<tr><td colspan="6" class="empty"><div class="icon">🔍</div>没有可解析的数据</td></tr>`;
    document.getElementById('match-stat').innerHTML='';
    return;
  }

  let totalMatched=0, rows=[];
  lines.forEach((p,pi)=>{
    const hits = p.parsed ? matchPlatformSku(p) : [];
    const rowCount = Math.max(1, hits.length);
    if (hits.length) totalMatched++;

    const SERIES_COLORS = {'A':'background:#e0f2fe;color:#075985','B':'background:#fef3c7;color:#92400e','A+B':'background:#ede7f6;color:#4527a0','历史':'background:#f3f4f6;color:#374151'};
    if (!hits.length) {
      const divider = pi>0?' group-divider':'';
      const rowClass = pi%2===0?'combo-row-a':'combo-row-b';
      rows.push(`<tr class="${rowClass}${divider}">
        <td><code>${esc(p.skuId)}</code></td>
        <td>${esc(p.skuName)}</td>
        <td style="color:var(--warn);font-size:12px">⚠ 未找到匹配</td>
        <td>-</td><td>-</td><td>-</td>
      </tr>`);
    }

    hits.forEach((h,hi)=>{
      const divider = (pi>0 && hi===0) ? ' group-divider' : '';
      const rowClass = pi%2===0 ? 'combo-row-a':'combo-row-b';
      const typeBadge = h.type==='单品'
        ? `<span class="badge b数" style="background:#e3f2fd;color:#1565c0">${h.type}</span>`
        : `<span class="badge b科" style="background:#ede7f6;color:#4527a0">${h.type}</span>`;
      const sc = SERIES_COLORS[h._series||''] || '';
      const seriesBadge = h._series ? `<span class="badge" style="${sc};white-space:nowrap">${esc(h._series)}</span>` : '-';
      // 每行都输出完整6列，不用rowspan（保证导出列对齐）
      rows.push(`<tr class="${rowClass}${divider}">
        <td><code>${esc(p.skuId)}</code></td>
        <td>${esc(p.skuName)}</td>
        <td>${typeBadge}</td>
        <td><code>${esc(h.code)}</code></td>
        <td>${esc(h.name)}</td>
        <td>${seriesBadge}</td>
      </tr>`);
    });
  });

  tbody.innerHTML = rows.join('');
  const unmatched = lines.length - totalMatched;
  document.getElementById('match-stat').innerHTML =
    `共 <strong>${lines.length}</strong> 条，匹配成功 <strong>${totalMatched}</strong> 条` +
    (unmatched ? `，<span style="color:var(--warn)">${unmatched} 条未匹配</span>` : '');
}

function clearMatch() {
  document.getElementById('match-input').value='';
  matchRecords=[];
  document.getElementById('match-stat').innerHTML='';
  document.getElementById('match-tbody').innerHTML=
    `<tr><td colspan="6" class="empty"><div class="icon">🔗</div>粘贴平台SKU后点击「解析并匹配」</td></tr>`;
}

function getMatchDataRows() {
  return Array.from(document.querySelectorAll('#match-tbody tr')).filter(tr=>!tr.querySelector('td[colspan="5"]')||tr.querySelector('td[colspan="3"]'));
}

function copyMatchResult() {
  const rows = Array.from(document.querySelectorAll('#match-tbody tr')).filter(tr=>!tr.querySelector('.empty'));
  if (!rows.length){showToast('没有数据可复制');return;}
  const header='平台SKU编码\t平台SKU名称\t匹配类型\t匹配编码\t匹配名称\t系列';
  const body=rows.map(tr=>{
    const c=tr.cells;
    if(c.length<6) return '';
    return [c[0],c[1],c[2],c[3],c[4],c[5]].map(td=>td.textContent.trim()).join('\t');
  }).filter(Boolean).join('\n');
  doClipboard(header+'\n'+body,'✓ 已复制，可粘贴到 Excel');
}

function exportMatchCSV() {
  const rows = Array.from(document.querySelectorAll('#match-tbody tr')).filter(tr=>!tr.querySelector('.empty'));
  if (!rows.length){showToast('没有数据可导出');return;}
  const eq=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  const header=['平台SKU编码','平台SKU名称','匹配类型','匹配编码','匹配名称','系列'].map(eq).join(',');
  const body=rows.map(tr=>{
    const c=tr.cells;
    if(c.length<6) return '';
    return [c[0],c[1],c[2],c[3],c[4],c[5]].map(td=>eq(td.textContent.trim())).join(',');
  }).filter(Boolean).join('\n');
  downloadCSV('平台SKU匹配结果.csv',header+'\n'+body);
}

// ════════════════════════════════════════════
//  天气组件
// ════════════════════════════════════════════
const WMO_ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'❄️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️',
};
const WMO_DESC = {
  0:'晴',1:'晴间多云',2:'多云',3:'阴',
  45:'雾',48:'雾',
  51:'小雨',53:'小雨',55:'中雨',
  61:'小雨',63:'中雨',65:'大雨',
  71:'小雪',73:'中雪',75:'大雪',
  80:'小阵雨',81:'中阵雨',82:'雷阵雨',
  95:'雷暴',96:'雷暴',99:'强雷暴',
};

async function initWeather() {
  const el = document.getElementById('weather-text');
  try {
    // 1. 获取位置
    const pos = await new Promise((res,rej)=>
      navigator.geolocation.getCurrentPosition(res, rej, {timeout:6000})
    );
    const {latitude:lat, longitude:lon} = pos.coords;

    // 2. 反向地理编码（获取城市名）
    let cityName = '';
    try {
      const geoRes = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=zh`
      );
      const geoData = await geoRes.json();
      const addr = geoData.address || {};
      cityName = addr.city || addr.town || addr.county || addr.state || '';
    } catch(e) {}

    // 3. 获取天气
    const wRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,weathercode&timezone=auto&forecast_days=1`
    );
    const wData = await wRes.json();
    const temp = Math.round(wData.current.temperature_2m);
    const code = wData.current.weathercode;
    const icon = WMO_ICONS[code] || '🌡️';
    const desc = WMO_DESC[code] || '';

    el.innerHTML = `${icon} <span class="weather-temp">${temp}°C</span>` +
      `<span>${desc}</span>` +
      (cityName ? `<span class="weather-city">· ${cityName}</span>` : '');

  } catch(e) {
    // 定位失败：用IP定位兜底
    try {
      const ipRes = await fetch('https://ipapi.co/json/');
      const ipData = await ipRes.json();
      const wRes = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${ipData.latitude}&longitude=${ipData.longitude}` +
        `&current=temperature_2m,weathercode&timezone=auto&forecast_days=1`
      );
      const wData = await wRes.json();
      const temp = Math.round(wData.current.temperature_2m);
      const code = wData.current.weathercode;
      const icon = WMO_ICONS[code] || '🌡️';
      const desc = WMO_DESC[code] || '';
      const city = ipData.city || '';
      el.innerHTML = `${icon} <span class="weather-temp">${temp}°C</span>` +
        `<span>${desc}</span>` +
        (city ? `<span class="weather-city">· ${city}</span>` : '');
    } catch(e2) {
      el.textContent = '天气获取失败';
    }
  }
}

// 页面加载后初始化天气，每30分钟刷新
window.addEventListener('DOMContentLoaded', ()=>{
  initWeather();
  setInterval(initWeather, 30*60*1000);
});

let toastTimer;
function showToast(msg){
  let el=document.querySelector('.toast');
  if(!el){el=document.createElement('div');el.className='toast';document.body.appendChild(el);}
  el.textContent=msg; clearTimeout(toastTimer);
  el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
