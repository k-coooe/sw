<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL 工具</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fb;--surface:#fff;--border:#e2e6ef;
      --accent:#3b5bdb;--accent-light:#eef1fd;
      --text:#1a1d2e;--muted:#6b7280;--warn:#f59e0b;
      --green:#2d9e5f;--radius:8px;
      --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    }
    body{font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 60px}
    .page{max-width:860px;margin:0 auto}

    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .back-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
      font-size:13px;border-radius:6px;border:1px solid var(--border);
      background:var(--surface);color:var(--muted);cursor:pointer;
      text-decoration:none;transition:background .15s}
    .back-btn:hover{background:#f3f4f8;color:var(--text)}
    .page-title{font-size:18px;font-weight:700;color:var(--text)}

    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);box-shadow:var(--shadow);
      padding:20px 24px;margin-bottom:16px}
    .card-title{font-size:15px;font-weight:700;color:var(--text);
      margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

    label.field-label{display:block;font-size:12px;font-weight:600;
      color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
      margin-bottom:6px;margin-top:14px}
    label.field-label:first-of-type{margin-top:0}

    input[type="text"],input[type="number"]{
      width:100%;padding:8px 10px;border:1px solid var(--border);
      border-radius:6px;font-size:13px;font-family:inherit;
      background:#fafbfd;color:var(--text);transition:border-color .2s}
    input[type="text"]:focus,input[type="number"]:focus{
      outline:none;border-color:var(--accent);background:#fff}

    .input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .input-row input[type="text"]{flex:1}
    .input-row input[type="number"]{width:80px;flex:none}
    .input-row .remove-btn{flex:none;padding:6px 10px;font-size:13px;
      border:1px solid var(--border);border-radius:6px;background:var(--surface);
      color:var(--muted);cursor:pointer}
    .input-row .remove-btn:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}

    .toolbar{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
    button{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;
      font-size:13px;font-family:inherit;border-radius:6px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--text);cursor:pointer;transition:background .15s;white-space:nowrap}
    button:hover{background:#f3f4f8}
    button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
    button.primary:hover{background:#2f4dc4}
    button.green{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
    button.green:hover{background:#268a52}

    .result-box{margin-top:14px;display:none}
    .result-box.show{display:block}
    textarea.url-out{width:100%;padding:10px 12px;border:1px solid var(--border);
      border-radius:6px;font-size:13px;font-family:Consolas,monospace;
      background:#fafbfd;color:var(--text);resize:vertical;
      line-height:1.6;min-height:56px}
    .result-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:rgba(26,29,46,.92);color:#fff;padding:8px 18px;
      border-radius:20px;font-size:13px;opacity:0;
      transition:opacity .25s;pointer-events:none;z-index:999}
    .toast.show{opacity:1}
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="index.html" class="back-btn">← 返回</a>
    <span class="page-title">🔗 URL 工具</span>
  </div>

  <!-- 模块1：批量下单 -->
  <div class="card">
    <div class="card-title">📦 批量下单链接</div>
    <div id="buy-rows">
      <div class="input-row">
        <input type="text" placeholder="宝贝ID"/>
        <input type="text" placeholder="SKU ID"/>
        <input type="number" value="1" min="1" title="数量"/>
        <button class="remove-btn" onclick="removeRow(this)">✕</button>
      </div>
    </div>
    <div class="toolbar">
      <button onclick="addBuyRow()">+ 添加一行</button>
      <button class="primary" onclick="genBuyLink()">生成链接</button>
    </div>
    <div id="buy-result" class="result-box">
      <textarea class="url-out" id="buy-out" readonly rows="2"></textarea>
      <div class="result-actions">
        <button onclick="copyOut('buy-out')">📋 复制链接</button>
        <button class="green" onclick="copyAndQr('buy-out')">📲 复制并跳转 qr.ma</button>
      </div>
    </div>
  </div>

  <!-- 模块2：搜索词链接 -->
  <div class="card">
    <div class="card-title">🔍 搜索词链接</div>
    <label class="field-label">历史搜索词 (lastQ)</label>
    <input type="text" id="last-q" placeholder="例：连衣裙"/>
    <label class="field-label">当前搜索词 (q)</label>
    <input type="text" id="curr-q" placeholder="例：夏季碎花连衣裙"/>
    <div class="toolbar">
      <button class="primary" onclick="genSearchLink()">生成链接</button>
    </div>
    <div id="search-result" class="result-box">
      <textarea class="url-out" id="search-out" readonly rows="4"></textarea>
      <div class="result-actions">
        <button onclick="copyOut('search-out')">📋 复制链接</button>
        <button class="green" onclick="copyAndQr('search-out')">📲 复制并跳转 qr.ma</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ── 批量下单 ──
  function addBuyRow() {
    const row = document.createElement('div');
    row.className = 'input-row';
    row.innerHTML = `
      <input type="text" placeholder="宝贝ID"/>
      <input type="text" placeholder="SKU ID"/>
      <input type="number" value="1" min="1" title="数量"/>
      <button class="remove-btn" onclick="removeRow(this)">✕</button>`;
    document.getElementById('buy-rows').appendChild(row);
  }

  function removeRow(btn) {
    const rows = document.querySelectorAll('#buy-rows .input-row');
    if (rows.length <= 1) { showToast('至少保留一行'); return; }
    btn.closest('.input-row').remove();
  }

  function genBuyLink() {
    const rows = document.querySelectorAll('#buy-rows .input-row');
    const parts = [];
    for (const row of rows) {
      const inputs = row.querySelectorAll('input');
      const itemId = inputs[0].value.trim();
      const skuId  = inputs[1].value.trim();
      const qty    = inputs[2].value.trim() || '1';
      if (!itemId || !skuId) { showToast('请填写完整的宝贝ID和SKU ID'); return; }
      parts.push(`${itemId}_${qty}_${skuId}`);
    }
    const url = `https://main.m.taobao.com/order/index.html?buyParam=${parts.join(',')}`;
    document.getElementById('buy-out').value = url;
    document.getElementById('buy-result').classList.add('show');
  }

  // ── 搜索词链接 ──
  function genSearchLink() {
    const q = document.getElementById('curr-q').value.trim();
    if (!q) { showToast('请填写当前搜索词'); return; }
    const lastQ = document.getElementById('last-q').value.trim();
    const params = {
      tb2024:'false', searchDoorFrom:'srp', lastQ,
      searchElderHomeOpen:'false', q,
      spm:'a2141.7631694.0.0', g_searchBoxShowType:'UOne',
      layeredSrp:'true', search_action:'initiative', grayHair:'false',
      sug_session_id: uuid(), from:'input',
      datasource_token: Date.now().toString(),
      hasTab:'false', sourceType:'other'
    };
    const qs = Object.entries(params).map(([k,v])=>`${k}=${v}`).join('&');
    const url = `https://s.m.taobao.com/h5?${qs}`;
    document.getElementById('search-out').value = url;
    document.getElementById('search-result').classList.add('show');
  }

  function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random()*16|0, v = c==='x'?r:(r&3|8);
      return v.toString(16);
    });
  }

  // ── 复制 ──
  async function copyOut(id) {
    const text = document.getElementById(id).value;
    if (!text) return;
    try { await navigator.clipboard.writeText(text); }
    catch { fallbackCopy(text); }
    showToast('已复制链接');
  }

  async function copyAndQr(id) {
    const url = document.getElementById(id).value.trim();
    if (!url) { showToast('请先生成链接'); return; }
    try { await navigator.clipboard.writeText(url); }
    catch { fallbackCopy(url); }
    showToast('已复制，正在跳转…');
    setTimeout(() => window.open('https://qr.ma/', '_blank'), 300);
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }
</script>
</body>
</html>
